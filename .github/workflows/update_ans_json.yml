name: Atualizar JSONs ANS

on:
  workflow_dispatch:
    inputs:
      uf:
        description: "UF a processar"
        required: true
        default: "RS"
      months:
        description: "Competências no formato AAAAMM separadas por espaço. Vazio = competência mais recente disponível"
        required: false
        default: ""
      force:
        description: "Reprocessar mesmo se o JSON já existir"
        required: false
        default: "false"

  schedule:
    - cron: "0 9 10 * *"

permissions:
  contents: write

jobs:
  update-ans-json:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Processar ANS
        shell: bash
        run: |
          UF="${{ github.event.inputs.uf }}"
          MONTHS="${{ github.event.inputs.months }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ -z "$UF" ]; then
            UF="RS"
          fi

          if [ "$FORCE" = "true" ]; then
            FORCE_FLAG="--force"
          else
            FORCE_FLAG=""
          fi

          if [ -z "$MONTHS" ]; then
            python scripts/update_ans_json.py --uf "$UF" --latest $FORCE_FLAG
          else
            python scripts/update_ans_json.py --uf "$UF" --months $MONTHS $FORCE_FLAG
          fi

      - name: Commitar arquivos atualizados
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
          else
            git commit -m "Atualiza JSONs ANS"
            git push
          fi
